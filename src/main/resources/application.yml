server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  # Local/default profile has no database configured (still uses the
  # JSON-file repositories), so skip DataSource/JPA autoconfiguration
  # entirely here - otherwise Spring Boot fails to boot looking for a
  # DataSource that doesn't exist. application-prod.yml re-enables these
  # (empty exclude list) once the "mysql" profile brings real DB config.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

streamerui:
  data-dir: ./data
  uploads-dir: ./uploads
  # This app is meant to run locally for one streamer (backend + overlay + admin
  # all on your own machine), so CORS is left wide open for convenience. If you
  # ever expose it beyond localhost, tighten this to your actual origins.
  cors:
    allowed-origins:
      - "*"
  youtube:
    # Floor on how often we poll YouTube's internal chat endpoint, even if it
    # tells us we could poll faster. No API key/quota involved with the
    # unofficial popout-chat approach, but this still avoids hammering it.
    min-poll-interval-ms: 2000

logging:
  level:
    com.streamerui: INFO
